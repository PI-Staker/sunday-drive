<style>
  :root{
    --bg:#12232A;
    --card:#1B2F37;
    --card-line:#2A434C;
    --gold:#E2A54D;
    --text:#F4EFE6;
    --muted:#93ACAE;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(226,165,77,0.08), transparent),
      var(--bg);
    color:var(--text);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
  }
  .wrap{
    width:100%;
    max-width:560px;
  }
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    margin-bottom:10px;
  }
  h1{
    font-family:'Newsreader', serif;
    font-weight:500;
    font-size:clamp(28px, 6vw, 40px);
    text-align:center;
    margin:0 0 28px;
    color:var(--text);
    letter-spacing:-0.01em;
  }

  .vibes-label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--muted);
    text-align:center;
    margin-bottom:12px;
  }
  .season-banner{
    text-align:center;
    font-family:'Work Sans', sans-serif;
    font-size:13.5px;
    color:var(--text);
    background:rgba(226,165,77,0.08);
    border:1px solid rgba(226,165,77,0.3);
    border-radius:12px;
    padding:10px 16px;
    margin-bottom:20px;
  }
  .vibes{
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:10px;
    margin-bottom:28px;
  }
  @media (min-width:480px){
    .vibes{ grid-template-columns:repeat(5, 1fr); }
  }
  .vibe-card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:12px;
    padding:12px 10px;
    text-align:center;
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .vibe-card:hover{ border-color:rgba(226,165,77,0.5); }
  .vibe-card:active{ transform:scale(0.98); }
  .vibe-card.selected{
    border-color:var(--gold);
    background:rgba(226,165,77,0.1);
  }
  .vibe-card .v-name{
    font-size:13px;
    font-weight:600;
    color:var(--text);
    margin-bottom:3px;
  }
  .vibe-card .v-sub{
    font-size:11px;
    color:var(--muted);
    line-height:1.3;
  }
  .vibe-card:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  .picker{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    margin-bottom:8px;
  }
  button.roll{
    font-family:'Work Sans', sans-serif;
    font-weight:600;
    font-size:16px;
    color:#12232A;
    background:var(--gold);
    border:none;
    border-radius:999px;
    padding:16px 34px;
    cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow:0 0 0 rgba(226,165,77,0);
  }
  button.roll:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 24px rgba(226,165,77,0.25);
  }
  button.roll:active{ transform:translateY(0px); }
  button.roll:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:3px;
  }
  .picker-hint{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--muted);
    min-height:16px;
  }

  #result{
    margin-top:36px;
    opacity:0;
    transform:translateY(6px);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  #result.show{
    opacity:1;
    transform:translateY(0);
  }

  .photo-frame{
    position:relative;
    width:100%;
    aspect-ratio:16/10;
    border-radius:16px;
    overflow:hidden;
    background:linear-gradient(160deg, #23414B, #17272E);
    border:1px solid var(--card-line);
    margin-bottom:20px;
  }
  .photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .photo-fallback{
    position:absolute;
    inset:0;
    display:none;
    align-items:flex-end;
    padding:16px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    background:
      repeating-linear-gradient(135deg, rgba(226,165,77,0.05) 0px, rgba(226,165,77,0.05) 2px, transparent 2px, transparent 14px),
      linear-gradient(160deg, #23414B, #17272E);
  }
  .photo-frame.no-image .photo-fallback{ display:flex; }
  .photo-frame.no-image img{ display:none; }
  .photo-scrim{
    position:absolute;
    left:0; right:0; bottom:0;
    height:55%;
    background:linear-gradient(to top, rgba(18,35,42,0.85), transparent);
    pointer-events:none;
  }
  .photo-credit{
    position:absolute;
    right:10px;
    bottom:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    color:rgba(244,239,230,0.55);
    letter-spacing:0.02em;
  }

  .route-name{
    font-family:'Newsreader', serif;
    font-weight:500;
    font-size:clamp(24px, 5vw, 30px);
    text-align:center;
    margin:0 0 6px;
    line-height:1.2;
  }

  .squiggle{
    display:block;
    margin:2px auto 18px;
    width:120px;
    height:16px;
  }
  .squiggle path{
    fill:none;
    stroke:var(--gold);
    stroke-width:2;
    stroke-linecap:round;
    stroke-dasharray:200;
    stroke-dashoffset:200;
    animation:draw 0.9s ease forwards 0.15s;
  }
  @keyframes draw{ to{ stroke-dashoffset:0; } }

  .meta{
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  .pill{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.03em;
    color:var(--muted);
    border:1px solid var(--card-line);
    border-radius:999px;
    padding:5px 12px;
  }
  .vibe{
    text-align:center;
    font-style:italic;
    color:var(--muted);
    font-size:15px;
    margin-bottom:20px;
  }

  .maps-link{
    display:flex;
    justify-content:center;
    margin-bottom:28px;
  }
  .maps-link a{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'Work Sans', sans-serif;
    font-size:14px;
    font-weight:500;
    color:var(--gold);
    text-decoration:none;
    border:1px solid rgba(226,165,77,0.4);
    border-radius:999px;
    padding:9px 18px;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .maps-link a:hover{
    background:rgba(226,165,77,0.08);
    border-color:var(--gold);
  }
  .maps-hint{
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--muted);
    margin-top:-20px;
    margin-bottom:28px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--card-line);
    border-radius:16px;
    padding:24px 26px;
    margin-bottom:16px;
  }
  .card h2{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold);
    margin:0 0 14px;
    font-weight:500;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
  }
  .card h2 .count{
    color:var(--muted);
    font-weight:400;
    text-transform:none;
    letter-spacing:0;
  }
  .tracks{
    list-style:none;
    margin:0;
    padding:0;
    max-height:340px;
    overflow-y:auto;
  }
  .tracks li{
    display:flex;
    gap:12px;
    padding:7px 0;
    font-size:14.5px;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .tracks li:last-child{ border-bottom:none; }
  .tracks .num{
    font-family:'JetBrains Mono', monospace;
    color:var(--muted);
    font-size:13px;
    width:22px;
    flex-shrink:0;
  }
  .stops{
    list-style:none;
    margin:0;
    padding:0;
  }
  .stops li{
    display:flex;
    gap:10px;
    padding:6px 0;
    font-size:14.5px;
    line-height:1.4;
  }
  .stops li::before{
    content:"–";
    color:var(--gold);
    flex-shrink:0;
  }

  .again{
    display:flex;
    justify-content:center;
    margin-top:8px;
  }
  button.again-btn{
    font-family:'Work Sans', sans-serif;
    font-size:13.5px;
    color:var(--muted);
    background:none;
    border:1px solid var(--card-line);
    border-radius:999px;
    padding:9px 20px;
    cursor:pointer;
    transition:color 0.15s ease, border-color 0.15s ease;
  }
  button.again-btn:hover{
    color:var(--text);
    border-color:var(--gold);
  }
  button.again-btn:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    #result, .squiggle path{ transition:none; animation:none; }
    .squiggle path{ stroke-dashoffset:0; }
  }
</style>
</head>

<div class="wrap">
  <div class="eyebrow">Western Cape · Sunday</div>

  <div class="season-banner" id="seasonBanner" style="display:none;"></div>

  <div class="vibes-label">Pick a vibe (optional)</div>

  <div class="picker">

  </div>

  <div id="result">
    <div class="photo-frame" id="photoFrame">
      <img id="photoImg" alt="">
      <div class="photo-scrim"></div>
      <div class="photo-fallback" id="photoFallback"></div>
      <div class="photo-credit" id="photoCredit"></div>
    </div>

    <div class="route-name" id="routeName"></div>
    <svg class="squiggle" viewBox="0 0 120 16" id="squiggleSvg">
      <path d="M2 12 Q 20 2, 35 10 T 65 8 T 95 12 T 118 6"/>

    <div class="meta">
      <span class="pill" id="durationPill"></span>
      <span class="pill" id="lengthPill"></span>
      <span class="pill" id="seasonPill" style="display:none;"></span>
    </div>
    <div class="vibe" id="vibeLine"></div>
    <div class="maps-link">
      <a id="mapsBtn" href="#" target="_blank" rel="noopener">Open route in Google Maps →</a>
    </div>
    <div class="maps-hint" id="mapsHint">Starts from your location, if you allow it</div>

    <div class="card">
      <h2><span>Playlist</span><span class="count" id="trackCount"></span></h2>
      <ul class="tracks" id="tracksList"></ul>
    </div>

    <div class="card" id="stopsCard">
      <h2>Worth stopping for</h2>
      <ul class="stops" id="stopsList"></ul>
    </div>

    <div class="again">
      <button class="again-btn" id="againBtn">Roll again</button>
    </div>
  </div>
</div>

    playlist: ["Girls – Lust for Life","Fleet Foxes – Mykonos","Beirut – Nantes","Vampire Weekend – Step","Grizzly Bear – Two Weeks","Real Estate – Talking Backwards","The War on Drugs – Red Eyes","Whitney – No Woman","Big Thief – Shark Smile","Alvvays – Archie, Marry Me","Snail Mail – Pristine","Beach Fossils – Clash the Truck","DIIV – Doused","Wild Nothing – Chinatown","Craft Spells – After the Moment","Deerhunter – Desire Lines","Cloud Nothings – Stay Useless","Wolf Parade – Modern World","Broken Social Scene – Anthems for a Seventeen-Year-Old Girl","Arcade Fire – Wake Up","The Antlers – Kettering","Bombay Bicycle Club – Shuffle","Two Door Cinema Club – Sun","Foster The People – Houdini","Vampire Weekend – Cape Cod Kwassa Kwassa","Grizzly Bear – Knife","Real Estate – Green Aisles","Whitney – Golden Days"],
    stops: ["Paternoster's seafood shacks","Langebaan lagoon viewpoint"]
  },
  {
    name: "The Wildflower Route: West Coast → Namaqualand",
    duration: 660,
    vibe: "Follow the bloom — a once-a-year, multi-day road trip",
    vibeKey: "epic",
    seasonal: { label: "🌼 Wildflower season", activeMonths: [7, 8, 9] },
    origin: "Cape Town, Western Cape",
    destination: "Namaqua National Park, Northern Cape",
    waypoint: "West Coast National Park, Western Cape|Darling, Western Cape|Clanwilliam, Western Cape|Nieuwoudtville, Western Cape",
    playlist: ["Fleet Foxes – Blue Ridge Mountains","The Head and the Heart – Honeybee","Ben Howard – Small Things","Vance Joy – Georgia","The Lumineers – Cleopatra","Milky Chance – Stolen Dance","Hozier – Work Song","The Paper Kites – Featherstone","Gregory Alan Isakov – Second Chances","City and Colour – Body in a Box","Dawes – When My Time Comes","Mt. Joy – Silver Lining","Rayland Baxter – Yellow Eyes","Bahamas – All the Time","Shakey Graves – Roll The Bones","The Tallest Man on Earth – Fields of Our Home","Iron & Wine – Naked As We Came","Bon Iver – Towers"],
    stops: ["West Coast National Park's Postberg section — Cape daisies and vygies against Langebaan Lagoon","Darling for farm stalls and a slow lunch","Nieuwoudtville, the \"bulb capital of the world\"","Namaqua National Park's Skilpad section — the grand finale, best viewed 10am–3pm when blooms are open"]
  }
];

let lastName = null;
let selectedVibe = null;

function lengthLabel(min){
  if(min <= 25) return "Quick";
  if(min <= 45) return "Half morning";
  if(min <= 180) return "Full outing";
  return "Multi-day trip";
}

function buildMapsUrl(d, originOverride){
  const params = new URLSearchParams({
    api: "1",
    origin: originOverride || d.origin,
    destination: d.destination,
    travelmode: "driving"
  });
  if(d.waypoint){
    params.set("waypoints", d.waypoint);
  }
  return "https://www.google.com/maps/dir/?" + params.toString();
}

function openRouteFromHere(d){
  const fallbackUrl = buildMapsUrl(d);
  const hint = document.getElementById('mapsHint');

  if(!navigator.geolocation){
    window.open(fallbackUrl, '_blank', 'noopener');
    return;
  }

  hint.textContent = 'Finding your location…';

  navigator.geolocation.getCurrentPosition(
    pos => {
      const originCoords = `${pos.coords.latitude},${pos.coords.longitude}`;
      window.open(buildMapsUrl(d, originCoords), '_blank', 'noopener');
      hint.textContent = 'Started from your location';
    },
    err => {
      window.open(fallbackUrl, '_blank', 'noopener');
      hint.textContent = err.code === 1
        ? 'Location denied — started from ' + d.origin
        : 'Couldn\'t get your location — started from ' + d.origin;
    },
    { timeout: 6000, maximumAge: 300000 }
  );
}

function buildImageUrl(filename){
  return "https://commons.wikimedia.org/wiki/Special:FilePath/" + encodeURIComponent(filename) + "?width=800";
}

function renderVibeCards(){
  const container = document.getElementById('vibeCards');
  container.innerHTML = '';
  vibeDefs.forEach(v => {
    const card = document.createElement('div');
    card.className = 'vibe-card' + (selectedVibe === v.key ? ' selected' : '');
    card.tabIndex = 0;
    card.setAttribute('role', 'button');
    card.innerHTML = `<div class="v-name">${v.name}</div><div class="v-sub">${v.sub}</div>`;
    card.addEventListener('click', () => toggleVibe(v.key));
    card.addEventListener('keydown', (e) => {
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleVibe(v.key); }
    });
    container.appendChild(card);
  });
  updateHint();
}

function toggleVibe(key){
  selectedVibe = (selectedVibe === key) ? null : key;
  renderVibeCards();
}

function updateHint(){
  const hint = document.getElementById('pickerHint');
  if(selectedVibe){
    const v = vibeDefs.find(x => x.key === selectedVibe);
    hint.textContent = `Choosing from "${v.name}" drives`;
  } else {
    hint.textContent = 'No vibe selected — fully random';
  }
}

function isInSeason(d){
  if(!d.seasonal) return true;
  const currentMonth = new Date().getMonth() + 1; // 1-indexed
  return d.seasonal.activeMonths.includes(currentMonth);
}

function eligibleDrives(){
  return drives.filter(isInSeason);
}

function renderSeasonBanner(){
  const banner = document.getElementById('seasonBanner');
  const inSeasonSpecial = drives.find(d => d.seasonal && isInSeason(d));
  if(inSeasonSpecial){
    banner.style.display = '';
    banner.textContent = `${inSeasonSpecial.seasonal.label} is on — "${inSeasonSpecial.name}" is in the mix for a little while`;
  } else {
    banner.style.display = 'none';
  }
}

function pick(){
  const available = eligibleDrives();
  const pool = selectedVibe ? available.filter(d => d.vibeKey === selectedVibe) : available;
  let candidates = pool.filter(d => d.name !== lastName);
  if(candidates.length === 0) candidates = pool;
  const d = candidates[Math.floor(Math.random() * candidates.length)];
  lastName = d.name;
  render(d);
}

let currentDrive = null;

function render(d){
  currentDrive = d;
  document.getElementById('routeName').textContent = d.name;
  document.getElementById('durationPill').textContent = d.duration > 180
    ? `~${Math.round(d.duration / 60)} hrs total driving`
    : `~${d.duration} min`;
  document.getElementById('lengthPill').textContent = lengthLabel(d.duration);
  document.getElementById('vibeLine').textContent = d.vibe;
  document.getElementById('mapsBtn').href = buildMapsUrl(d);
  document.getElementById('mapsHint').textContent = 'Starts from your location, if you allow it';
  document.getElementById('trackCount').textContent = `${d.playlist.length} tracks`;

  const seasonPill = document.getElementById('seasonPill');
  if(d.seasonal){
    seasonPill.style.display = '';
    seasonPill.textContent = d.seasonal.label;
  } else {
    seasonPill.style.display = 'none';
  }

  const frame = document.getElementById('photoFrame');
  const img = document.getElementById('photoImg');
  const credit = document.getElementById('photoCredit');
  if(d.image){
    frame.style.display = '';
    frame.classList.remove('no-image');
    img.onerror = () => { frame.style.display = 'none'; };
    img.src = buildImageUrl(d.image);
    img.alt = d.name;
    credit.textContent = 'Photo · Wikimedia Commons';
  } else {
    frame.style.display = 'none';
  }

  const tracksEl = document.getElementById('tracksList');
  tracksEl.innerHTML = '';
  d.playlist.forEach((t, idx) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="num">${String(idx+1).padStart(2,'0')}</span><span>${t}</span>`;
    tracksEl.appendChild(li);
  });

  const stopsCard = document.getElementById('stopsCard');
  const stopsEl = document.getElementById('stopsList');
  stopsEl.innerHTML = '';
  if(d.stops.length){
    stopsCard.style.display = '';
    d.stops.forEach(s => {
      const li = document.createElement('li');
      li.textContent = s;
      stopsEl.appendChild(li);
    });
  } else {
    stopsCard.style.display = 'none';
  }

  const svg = document.getElementById('squiggleSvg');
  const newSvg = svg.cloneNode(true);
  svg.parentNode.replaceChild(newSvg, svg);
  newSvg.id = 'squiggleSvg';

  const result = document.getElementById('result');
  result.classList.remove('show');
  void result.offsetWidth;
  result.classList.add('show');
}

renderVibeCards();
renderSeasonBanner();
document.getElementById('rollBtn').addEventListener('click', pick);
document.getElementById('againBtn').addEventListener('click', pick);
document.getElementById('mapsBtn').addEventListener('click', (e) => {
  e.preventDefault();
  if(currentDrive) openRouteFromHere(currentDrive);
});
</script>
